[build]
  publish = "dist"
  command = "npm run build"

# Staging context — deploys from 'staging' branch with staging env vars
[context.staging]
  command = "npm run build"
  publish = "dist"

# Branch deploys enabled for staging
[context.branch-deploy]
  command = "npm run build"

# SM26 event module: enable its public /sm26/* routes on every NON-production
# context (PR deploy previews, branch deploys, staging) so it can be tested,
# while production stays hidden until launch. To go live, set
# VITE_SM26_ENABLED=true on the production context (Netlify UI) and redeploy.
[context.deploy-preview.environment]
  VITE_SM26_ENABLED = "true"

[context.branch-deploy.environment]
  VITE_SM26_ENABLED = "true"

[context.staging.environment]
  VITE_SM26_ENABLED = "true"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
