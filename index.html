<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>M3 Connect — B2B Platform for the Marina Industry</title>
    <meta name="description" content="M3 Connect is the B2B platform connecting marina operators, service providers and media professionals worldwide. Discover resources, events, and partnership opportunities." />
    <meta name="keywords" content="marina, B2B, platform, yacht, port, maritime, partners, events, superyacht, marina management" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://connect.m3monaco.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="M3 Connect" />
    <meta property="og:title" content="M3 Connect — B2B Platform for the Marina Industry" />
    <meta property="og:description" content="Connect with marina operators, service providers and media professionals worldwide." />
    <meta property="og:url" content="https://connect.m3monaco.com/" />
    <meta property="og:image" content="https://connect.m3monaco.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="M3 Connect — B2B Platform for the Marina Industry" />
    <meta name="twitter:description" content="Connect with marina operators, service providers and media professionals worldwide." />
    <meta name="twitter:image" content="https://connect.m3monaco.com/og-image.png" />

    <!-- PWA / Mobile -->
    <meta name="theme-color" content="#0f4c75" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- SogeCommerce / Lyra Payment Form — script loaded globally (required by SDK), CSS lazy-loaded in PaymentForm -->
    <script src="https://api-sogecommerce.societegenerale.eu/static/js/krypton-client/V4.0/ext/classic.js"></script>

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "M3 Connect",
      "description": "B2B platform for the marina industry connecting marina operators, service providers and media professionals",
      "url": "https://connect.m3monaco.com",
      "logo": "https://connect.m3monaco.com/og-image.png",
      "sameAs": [
        "https://www.linkedin.com/company/monaco-marina-management",
        "https://www.instagram.com/monacomarinamanagement/"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "email": "contact@m3monaco.com",
        "availableLanguage": ["English", "French"]
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
